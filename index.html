<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جمعية البركة الخيرية</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Tajawal',sans-serif;
    background:#f6f8fb;
    text-align:center;
    margin:0;
    padding:0;
}

.container{
    padding:40px 20px;
}

.logo{
    width:220px;
    margin-bottom:20px;
}

h1{
    color:#1c7c54;
    font-size:28px;
    margin-bottom:40px;
}

.branches{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.branch{
    background:white;
    padding:20px;
    width:170px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    text-decoration:none;
    color:#333;
    transition:0.3s;
}

.branch:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}

.footer{
    margin-top:40px;
    font-size:14px;
    color:#888;
}

</style>
</head>

<body>

<div class="container">

<img class="logo" src="ضع_رابط_الشعار_هنا" alt="شعار البركة">

<h1>نسعد باستقبالكم</h1>

<div class="branches">

<a class="branch" href="https://maps.app.goo.gl/DhWfvW7fDoVUbUf47" target="_blank">
<div class="icon">📍</div>
الجامعين
</a>

<a class="branch" href="https://maps.app.goo.gl/87AP2tt2X7mYj1747" target="_blank">
<div class="icon">📍</div>
فرع الشاطئ
</a>

<a class="branch" href="https://maps.app.goo.gl/6xiuJ7qL5gzsLxw88" target="_blank">
<div class="icon">📍</div>
فرع الخير
</a>

<a class="branch" href="https://maps.app.goo.gl/6YUVgcMEyTtyu4hh6" target="_blank">
<div class="icon">📍</div>
فرع الجبيل
</a>

</div>

<div class="footer">
جمعية البركة الخيرية
</div>

</div>

</body>
</html>
