<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروع جمعية البركة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* خلفية الصفحة وتنسيق عام */
body{
    font-family:'Tajawal',sans-serif;
    background: linear-gradient(180deg,#016b6b 0%,#c5eded 100%);
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* حاوية كل المحتوى */
.container{
    width:100%;
    max-width:420px;
    padding:40px 20px;
    box-sizing:border-box;
}

/* الشعار */
.logo{
    width:180px;
    margin:0 auto 20px auto;
    display:block;
}

/* عنوان الصفحة */
.title{
    font-size:24px;
    font-weight:700;
    margin-bottom:30px;
    color:white;
}

/* بطاقات الفروع */
.link{
    display:block;
    background:white;
    border:2px solid #016b6b;
    padding:18px;
    margin:14px 0;
    border-radius:12px;
    text-decoration:none;
    color:#016b6b;
    font-size:18px;
    font-weight:600;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    transition:0.3s;
}

.link:hover{
    transform:scale(1.05);
    background:#016b6b;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<!-- ضع هنا اسم الشعار الذي رفعت على GitHub -->
<img class="logo" src="logo.png" alt="شعار البركة">

<div class="title">
نسعد باستقبالكم
</div>

<a class="link" href="https://maps.app.goo.gl/DhWfvW7fDoVUbUf47" target="_blank">
📍 فرع الجامعين
</a>

<a class="link" href="https://maps.app.goo.gl/87AP2tt2X7mYj1747" target="_blank">
📍 فرع الشاطئ
</a>

<a class="link" href="https://maps.app.goo.gl/6xiuJ7qL5gzsLxw88" target="_blank">
📍 فرع الخير
</a>

<a class="link" href="https://maps.app.goo.gl/6YUVgcMEyTtyu4hh6" target="_blank">
📍 فرع الجبيل
</a>

</div>

</body>
</html>
