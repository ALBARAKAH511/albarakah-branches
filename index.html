<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروع جمعية البركة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Tajawal',sans-serif;
    background: linear-gradient(180deg,#016b6b 0%,#c5eded 100%);
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
}

.container{
    width:100%;
    max-width:480px;
    padding:40px 25px;
    box-sizing:border-box;
    background: rgba(255,255,255,0.05);
    border-radius:20px;
}

/* شعار الجمعية بدون أي خلفية أو حواف */
.logo-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 20px auto;
}

.logo{
    width:auto;
    height:auto;
    max-width:100%;
    max-height:160px; /* أقصى ارتفاع للشعار */
}

/* عنوان الصفحة */
.title{
    font-size:24px;
    font-weight:700;
    margin-bottom:30px;
    color:white;
}

/* بطاقات الفروع */
.link{
    display:block;
    background:white;
    border:2px solid #016b6b;
    padding:18px;
    margin:14px 0;
    border-radius:12px;
    text-decoration:none;
    color:#016b6b;
    font-size:18px;
    font-weight:600;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    transition:0.3s;
}

.link:hover{
    transform:scale(1.05);
    background:#016b6b;
    color:white;
}

@media (max-width: 480px) {
    .container{
        padding:30px 15px;
    }
    .logo{
        max-height:120px;
    }
    .title{
        font-size:22px;
    }
    .link{
        font-size:16px;
        padding:14px 16px;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- شعار الجمعية كامل بدون أي حواف بيضاء -->
<div class="logo-wrapper">
    <img class="logo" src="https://i.ibb.co/qMStJd7d/logo.png" alt="شعار جمعية البركة">
</div>

<div class="title">
نسعد باستقبالكم
</div>

<a class="link" href="https://maps.app.goo.gl/DhWfvW7fDoVUbUf47" target="_blank">
📍 فرع الجامعين
</a>

<a class="link" href="https://maps.app.goo.gl/87AP2tt2X7mYj1747" target="_blank">
📍 فرع الشاطئ
</a>

<a class="link" href="https://maps.app.goo.gl/6xiuJ7qL5gzsLxw88" target="_blank">
📍 فرع الخير
</a>

<a class="link" href="https://maps.app.goo.gl/6YUVgcMEyTtyu4hh6" target="_blank">
📍 فرع الجبيل
</a>

</div>

</body>
</html>
