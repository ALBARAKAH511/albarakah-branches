<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروع جمعية البركة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Tajawal',sans-serif;
    background: linear-gradient(180deg,#016b6b 0%,#c5eded 100%);
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
}

.container{
    width:100%;
    max-width:600px;
    padding:40px 25px;
    box-sizing:border-box;
    background: rgba(255,255,255,0.05);
    border-radius:50px;
}

/* تحسين عرض الشعار بدون قص */
.logo-wrapper{
    width:100%;
    height:140px;
    background-image: url('https://i.ibb.co/qMStJd7d/logo.png');
    background-size: contain; /* أهم شيء: يمنع القص */
    background-repeat: no-repeat;
    background-position: center;
    margin-bottom:30px;
}

/* وصف الجمعية */
.org-desc{
    font-size:13px;
    color: rgba(255,255,255,0.9);
    margin-bottom:15px;
    line-height:1.6;
}

/* عنوان الصفحة */
.title{
    font-size:24px;
    font-weight:700;
    margin-bottom:5px;
    color:white;
}

/* عبارة صغيرة تحت العنوان */
.subtitle{
    font-size:14px;
    color: rgba(255,255,255,0.8);
    margin-bottom:25px;
}

/* بطاقات الفروع */
.link{
    display:block;
    background:white;
    border:2px solid #016b6b;
    padding:18px;
    margin:14px 0;
    border-radius:12px;
    text-decoration:none;
    color:#016b6b;
    font-size:18px;
    font-weight:600;
    box-shadow:0 6px 14px rgba(0,0,0,0.15);
    transition:0.3s;
}

.link:hover{
    transform:scale(1.05);
    background:#016b6b;
    color:white;
}

@media (max-width: 480px) {
    .container{
        padding:30px 15px;
    }
    .logo-wrapper{
        height:110px;
    }
    .title{
        font-size:22px;
    }
    .link{
        font-size:16px;
        padding:14px 16px;
    }
}
</style>
</head>

<body>

<div class="container">

<!-- الشعار بدون قص -->
<div class="logo-wrapper"></div>

<!-- وصف الجمعية -->
<div class="org-desc">
جمعية البركة الخيرية للخدمات الاجتماعية <br>
المرخصة من المركز الوطني لتنمية القطاع غير الربحي برقم 511
</div>

<div class="title">
نسعد باستقبالكم
</div>

<div class="subtitle">
اختر الفرع المناسب 
</div>

<a class="link" href="https://maps.app.goo.gl/DhWfvW7fDoVUbUf47" target="_blank">
📍 فرع الجامعين
</a>

<a class="link" href="https://maps.app.goo.gl/87AP2tt2X7mYj1747" target="_blank">
📍 فرع الشاطئ
</a>

<a class="link" href="https://maps.app.goo.gl/6xiuJ7qL5gzsLxw88" target="_blank">
📍 فرع الخبر
</a>

<a class="link" href="https://maps.app.goo.gl/6YUVgcMEyTtyu4hh6" target="_blank">
📍 فرع الجبيل
</a>

</div>

</body>
</html>
